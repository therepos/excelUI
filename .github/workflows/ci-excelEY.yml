name: Release excelEY

on:
  push:
    branches: [ main ]
    paths:
      - src/excelEY
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: excelEY-v

      - name: Seal VBA project
        run: python scripts/vbaseal.py src/excelEY/excelEY.xlam

      - name: Package release
        run: |
          New-Item -ItemType Directory -Force -Path rel | Out-Null
          Copy-Item src\excelEY\excelEY.xlam rel\excelEY.xlam
          Copy-Item src\excelEY\excelEYsetup.cmd rel\excelEYsetup.cmd
          Compress-Archive -Path rel\excelEYsetup.cmd -DestinationPath rel\excelEY.zip -Force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            rel/excelEY.xlam
            rel/excelEY.zip
          token: ${{ secrets.GITHUB_TOKEN }}